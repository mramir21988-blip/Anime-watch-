<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0A0A0F;color:white;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;}
        .card{background:#1a1a22;padding:32px;border-radius:24px;width:90%;max-width:400px;border:1px solid #8B5CF6;}
        input,button{width:100%;padding:12px;margin:10px 0;background:#0A0A0F;border:1px solid #333;border-radius:12px;color:white;}
        button{background:#8B5CF6;font-weight:bold;cursor:pointer;}
        .error{color:#f87171;}
    </style>
</head>
<body>
<div class="card">
    <h2>🔐 Admin Login</h2>
    <input type="email" id="email" placeholder="Email" autocomplete="off">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <div id="msg" class="error"></div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // 🔁 YAHAN APNI FIREBASE CONFIG COPY KAR
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
            // Login successful, redirect to dashboard
            window.location.href = 'admin-dashboard.html';
        } catch (err) {
            document.getElementById('msg').innerText = 'Login failed: ' + err.message;
        }
    };
</script>
</body>
</html>
